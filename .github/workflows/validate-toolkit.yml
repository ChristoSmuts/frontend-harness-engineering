name: Validate toolkit

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Confirm template skill files use placeholders
        run: |
          test "$(find templates/skills -name SKILL.md | wc -l)" -gt 0
          grep -Fq '{{VERIFY_CMDS_BLOCK}}' templates/skills/frontend-verify/SKILL.md
          test -f templates/rules/shell-conventions.mdc.template

      - name: Bootstrap skills in sync
        run: |
          diff -q .cursor/skills/frontend-harness-bootstrap/SKILL.md agents/skills/frontend-harness-bootstrap/SKILL.md

      - name: Maintenance scripts exist (bash + PowerShell)
        run: |
          test -f scripts/sync-skills.sh
          test -f scripts/sync-skills.ps1
          test -f scripts/validate-target-harness.sh
          test -f scripts/validate-target-harness.ps1
          test -f scripts/emit-from-intake.sh
          test -f scripts/validate-fixture-manifest.sh
          test -f scripts/compare-fixture-maintenance-scripts.sh

      - name: Fixture maintenance scripts match toolkit
        run: bash scripts/compare-fixture-maintenance-scripts.sh

      - name: Shellcheck scripts and hook templates
        run: |
          sudo apt-get install -y -qq shellcheck
          shellcheck -a -P "scripts:templates/hooks" scripts/*.sh scripts/lib/*.sh templates/hooks/*.sh

      - name: Validate minimal fixture (bash)
        run: bash scripts/validate-target-harness.sh fixtures/minimal-full-emit

      - name: Golden full-emit mirror sync-check
        run: |
          cd fixtures/golden-full-emit
          find .cursor/skills .claude/skills -name SKILL.md -exec sed -i 's/\r$//' {} +
          bash .agent-scripts/sync-skills.sh --all-mirrors
          git diff --exit-code -- .cursor/skills .claude/skills || {
            echo "Mirror drift in golden-full-emit: run sync-skills locally and commit SKILL.md mirrors"
            exit 1
          }

      - name: Validate golden fixture (bash strict)
        run: bash scripts/validate-target-harness.sh --strict fixtures/golden-full-emit

      - name: Validate golden manifest paths
        run: bash scripts/validate-fixture-manifest.sh --profile full fixtures/golden-full-emit

      - name: Validate portable-only manifest paths
        run: bash scripts/validate-fixture-manifest.sh --profile portable-only fixtures/golden-portable-only-emit

      - name: Validate cursor-only manifest paths
        run: bash scripts/validate-fixture-manifest.sh --profile cursor-only fixtures/golden-cursor-only-emit

      - name: Validate agent-only-full manifest paths
        run: bash scripts/validate-fixture-manifest.sh --profile agent-only-full fixtures/golden-agent-only-full-emit

      - name: Emitter round-trip agent-only-full
        run: |
          bash scripts/normalize-harness-text-lf.sh fixtures/golden-agent-only-full-emit
          rm -rf /tmp/emit-agent-only
          mkdir -p /tmp/emit-agent-only
          bash scripts/emit-from-intake.sh \
            --answers fixtures/golden-agent-only-full-emit/intake.answers.json \
            --target /tmp/emit-agent-only \
            --toolkit .
          bash scripts/normalize-harness-text-lf.sh /tmp/emit-agent-only
          diff -ru fixtures/golden-agent-only-full-emit /tmp/emit-agent-only \
            --exclude=intake.answers.json \
            --exclude=HARNESS_CHANGELOG.md

      - name: Sync smoke (bash)
        run: |
          cp -r fixtures/minimal-full-emit /tmp/harness-sync-smoke
          echo "# smoke" >> /tmp/harness-sync-smoke/.agents/skills/frontend-verify/SKILL.md
          cd /tmp/harness-sync-smoke
          bash .agent-scripts/sync-skills.sh --all-mirrors
          cmp -s .agents/skills/frontend-verify/SKILL.md .cursor/skills/frontend-verify/SKILL.md
          bash .agent-scripts/validate-target-harness.sh .

      - name: Emitter round-trip vs golden
        run: |
          bash scripts/normalize-harness-text-lf.sh fixtures/golden-full-emit
          rm -rf /tmp/emit-out
          mkdir -p /tmp/emit-out
          bash scripts/emit-from-intake.sh \
            --answers fixtures/golden-full-emit/intake.answers.json \
            --target /tmp/emit-out \
            --toolkit .
          bash scripts/normalize-harness-text-lf.sh /tmp/emit-out
          diff -ru fixtures/golden-full-emit /tmp/emit-out \
            --exclude=intake.answers.json \
            --exclude=HARNESS_CHANGELOG.md || {
            echo "Emitter output differs from golden fixture (changelog date may differ)"
            diff -ru fixtures/golden-full-emit /tmp/emit-out --exclude=intake.answers.json || true
            exit 1
          }

      - name: Emitter round-trip portable-only
        run: |
          bash scripts/normalize-harness-text-lf.sh fixtures/golden-portable-only-emit
          rm -rf /tmp/emit-portable
          mkdir -p /tmp/emit-portable
          bash scripts/emit-from-intake.sh \
            --answers fixtures/golden-portable-only-emit/intake.answers.json \
            --target /tmp/emit-portable \
            --toolkit .
          bash scripts/normalize-harness-text-lf.sh /tmp/emit-portable
          diff -ru fixtures/golden-portable-only-emit /tmp/emit-portable \
            --exclude=intake.answers.json \
            --exclude=HARNESS_CHANGELOG.md

      - name: Emitter round-trip cursor-only
        run: |
          bash scripts/normalize-harness-text-lf.sh fixtures/golden-cursor-only-emit
          rm -rf /tmp/emit-cursor
          mkdir -p /tmp/emit-cursor
          bash scripts/emit-from-intake.sh \
            --answers fixtures/golden-cursor-only-emit/intake.answers.json \
            --target /tmp/emit-cursor \
            --toolkit .
          bash scripts/normalize-harness-text-lf.sh /tmp/emit-cursor
          diff -ru fixtures/golden-cursor-only-emit /tmp/emit-cursor \
            --exclude=intake.answers.json \
            --exclude=HARNESS_CHANGELOG.md

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build web generator
        run: |
          cd web
          bun install --frozen-lockfile
          bun test
          bun run build

  validate-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - name: Validate minimal fixture (PowerShell)
        shell: pwsh
        run: pwsh -File scripts/validate-target-harness.ps1 -TargetRoot fixtures/minimal-full-emit

      - name: Validate golden fixture (PowerShell strict)
        shell: pwsh
        run: pwsh -File scripts/validate-target-harness.ps1 -Strict -TargetRoot fixtures/golden-full-emit

      - name: Validate golden manifest paths
        shell: pwsh
        run: pwsh -File scripts/validate-fixture-manifest.ps1 -Profile full -TargetRoot fixtures/golden-full-emit

      - name: Compare fixture maintenance scripts
        shell: pwsh
        run: bash scripts/compare-fixture-maintenance-scripts.sh

      - name: Sync smoke (PowerShell)
        shell: pwsh
        run: |
          Copy-Item -Recurse fixtures/minimal-full-emit $env:RUNNER_TEMP\harness-sync-smoke
          Add-Content "$env:RUNNER_TEMP\harness-sync-smoke\.agents\skills\frontend-verify\SKILL.md" "`n# smoke"
          Set-Location $env:RUNNER_TEMP\harness-sync-smoke
          pwsh -File .agent-scripts/sync-skills.ps1 -AllMirrors
          $a = Get-FileHash .agents/skills/frontend-verify/SKILL.md
          $b = Get-FileHash .cursor/skills/frontend-verify/SKILL.md
          if ($a.Hash -ne $b.Hash) { throw "Mirror drift after sync" }
          pwsh -File .agent-scripts/validate-target-harness.ps1

  validate-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ensure jq
        run: command -v jq >/dev/null 2>&1 || brew install jq

      - name: Validate golden fixture (PowerShell on macOS)
        shell: pwsh
        run: pwsh -File scripts/validate-target-harness.ps1 -Strict -TargetRoot fixtures/golden-full-emit
